[project]
name = "contextforge-mcp"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.6.0",
    "httpx>=0.28.0",
    "contextforge-backend",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contextforge_mcp"]

# Bu bölümü ekle:
[tool.uv.sources]
contextforge-backend = { workspace = true }